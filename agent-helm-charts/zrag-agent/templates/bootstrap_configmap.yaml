{{- if .Values.bootstrapJob.enabled }}
{{- $isGranite := contains "granite-3-3-8b-instruct" .Values.configmap.MODEL_ID }}
{{- $modelRuntime := default "" (or (get (get (get (get .Values "global" | default dict) "secrets" | default dict) "data" | default dict) "MODEL_RUNTIME") (get (get .Values "env" | default dict) "MODEL_RUNTIME")) -}}
{{- $isOpenAI := contains "openai_protocol" $modelRuntime }}
{{- $AgentFile := ternary "config/zrag_agent_granite.yaml" "config/zrag_agent.yaml" $isGranite }}
{{- $AgentContent := .Files.Get $AgentFile }}

{{- if and $isGranite $isOpenAI }}
  {{- $AgentContent = $AgentContent | replace "virtual-model/watsonx/ibm/granite-3-3-8b-instruct" "virtual-model/openai/ibm/granite-3-3-8b-instruct" }}
{{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-bootstrap-config
  annotations:
    {{- include "wxa4z.annotations" . | nindent 4 }}
data:
  zrag_agent_bootstrap_config.yaml: |-
{{ .Files.Get "config/zrag_agent_bootstrap_config.yaml" | indent 4 }}
  zrag_agent.yaml: |-
{{- $AgentContent | nindent 4 }}

{{- end }}