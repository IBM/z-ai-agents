replicaCount: 1

mcpImage:
  repository: icr.io/ibm-operations-aai/ibm-concert-z-agent
  tag: v1.2.0
  pullPolicy: Always

createSecret: false

mcpServerService:
  name: wxa4z-ibm-concert-agent-z-mcp-server-service
  ports:
    - name: mcp-server
      protocol: TCP
      port: 9002
      targetPort: 9002

mcpClientService:
  name: wxa4z-ibm-concert-agent-z-mcp-client-service
  ports:
    - name: mcp-client
      protocol: TCP
      port: 9001
      targetPort: 9001

mcpRoute:
  name: wxa4z-ibm-concert-agent-z-mcp-route
  annotations:
    hostGenerated: "true"
  serviceName: wxa4z-ibm-concert-agent-z-mcp-client-service
  weight: 100
  targetPort: mcp-client
  tls:
    termination: edge
    secretName: wxa4z-agents-tls-secret
    enableTlsCertMount: false # Set to true to mount TLS certs from secret when deploying standalone helm-chart.

env:
  CPD_VERSION: "5.2"
  DEPLOYMENT_TYPE: on-prem
  LOG_LEVEL: INFO
  VERIFY_SSL: "true"
  ONPREM_WML_INSTANCE_ID: openshift
  UNITE_METRIC_INDEX: unite-metrics
  UNITE_EVENT_INDEX: unite-events
  LLM_MODEL: meta-llama/llama-3-3-70b-instruct
  LANGFUSE_HOST: ""
  LANGFUSE_TRACING_ENABLED: false
  SUMMARY_DIR: /data
  GRAPH_RECURSION_LIMIT: "30"
  CONTEXT_LENGTH: "16000"
  CPD_AUTH_URL: ""
  DEBUG_TOOLSELECTION: "false"
  QUERY_PATH: "unite_langgraph_agent/concert_mcp_server/resources/opensearchQueries/"

mcpSecrets:
  name: ibm-concert-agent-z-mcp-secrets
  createSecret: true
  data:
    WATSONX_ML_URL: ""
    WATSONX_DEPLOYMENT_SPACE_ID: ""
    CPD_USERNAME: ""
    WATSONX_API_KEY: ""
    AGENT_AUTH_TOKEN: WXA4Z_SAMPLE_API_KEY
    UNITE_API_URL: ""
    UNITE_CLIENT_ID: ""
    UNITE_CLIENT_SECRET: ""
    UNITE_GRANT_TYPE: ""
    UNITE_TOKEN_URL: ""
    WRAPPER_PASSWORD: ""
    WRAPPER_USERNAME: ""
    LANGFUSE_SECRET_KEY:
    LANGFUSE_PUBLIC_KEY:
    WATSONX_PROJECT_ID: ""
    EMBEDDING_MODEL_PATH: "unite_langgraph_agent/agents/models/slate.30m.english.rtrvr-20240719T181101"
    TOOL_EMBEDDING_PATH: "unite_langgraph_agent/agents/tool_graph/tool_calling_graph/tool_embeddings"
    WRAPPER_URL: "https://wxa4z-opensearch-wrapper-wxa4z-zad.apps.wxa4z-cpd530-x86gpu2-medium-dev.cp.fyre.ibm.com/v1/query"
    CONCERT_MCP_SERVER_URL: "http://wxa4z-ibm-concert-agent-z-mcp-server-service.wxa4z-zad.svc.cluster.local:9002/mcp"
    CONCERT_MCP_SERVER_HOST: "0.0.0.0"
    CONCERT_MCP_SERVER_PATH: /mcp
    CONCERT_MCP_SERVER_PORT: "9002"
    OMEGAMON_MCP_URL: ""
    WORKLOAD_MCP_URL: ""
    AUTOMATION_MCP_URL: ""
    UNITE_LEGACY_API_URL: ""
    UNITE_AGENTIC_API_URL: ""

imagePullSecrets:
  - name: ibm-concert-image-mcp-pull-secret

mcpResources:
  limits:
    cpu: "2"
    memory: "2Gi"
  requests:
    cpu: "1"
    memory: "1Gi"

mcpPvc:
  storageClass: "ocs-storagecluster-cephfs"
  accessModes:
    - ReadWriteOnce
  enabled: true
  size: 8Gi

mcpNetworkPolicy:
  name: wxa4z-ibm-concert-agent-z-mcp-network-policy
  egress:
    - {}
  ingress:
    - {}

bootstrapJob:
  enabled: true
  completions: 1
  parallelism: 1
  backoffLimit: 2
  activeDeadlineSeconds: 1800
  image:
    repository: cp.icr.io/cp/ibm-watsonx-assistant-for-z/wxa4z-agent-bootstrapper
    tag: v3.2.0@sha256:2957329a637d4ce4c21bbd1b88da77f050497883ce78cabc96afeb1d790425f5
    pullPolicy: Always
    overwrite: "true"
  imagePullSecrets:
    - name: wxa4z-image-pull-secret
  secret:
    dev_mode: false # Set this to true if you are installing subchart independently. When using wxa4z-agentic-suite, this should be false.
    name: ibm-concert-agent-bootstrap-job-secret
    data:
      ORCHESTRATE_ENV_TYPE: cpd
      WATSONX_API_KEY: WATSONX_API_KEY
      ORCHESTRATE_ENV_URL: ORCHESTRATE_ENV_URL
      CPD_USERNAME: CPD_USERNAME
  env:
    ORCHESTRATE_ENV_NAME: "wxo-live-instance"
    CONFIG_PATH: "/ibm-concert-agent-bootstrap-config/ibm_concert_agent_bootstrap_config.yaml"
    HOME: /opt/app-root/src
  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "500m"
  serviceAccount:
    name: ibm-concert-agent-bootstrap-job-sa

# This is the image pull secret for pulling the agent image from icr.io, replace registry.server, registry.username and registry.entitlementKey with your own values.
registry:
  name: ibm-concert-image-pull-secret
  createSecret: true
  server: icr.io
  username: iamapikey
  entitlementKey: entitlementKey
