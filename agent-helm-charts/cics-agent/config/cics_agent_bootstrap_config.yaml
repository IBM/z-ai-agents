resources:
  agents:
    - name: CICS_Transaction_Server_Agents_for_Z
      kind: orchestrator
      path: /cics-agent-bootstrap-config/cics_agent.yaml
      collaborators:
        - name: CICS_Transaction_Server_Topology_Agent_for_Z_ext
          kind: external
          description: The CICS (Customer Information Control System) Transaction Server Topology agent can take queries about CICS topologies, including CICS Java and JVMs, CMAS, MVS, CPSM, ESSS, TS and servers, environment setups, CICS regions, native APIs, CF tables and indexing, outage mitigation, scaling, resource pools and technical questions and provide answers using documentation and subject matter expert data.
          route_name: ${CICS_AGENT_ROUTE_NAME}
          route_path: /v1/cics_chat/
          namespace: ${CICS_AGENT_NAMESPACE}
          auth_type: API_KEY
          auth_value_key: ${CICS_TS_AGENT_AUTH_TOKEN}
        - name: CICS_Transaction_Server_Problem_Determination_Agent_for_Z_ext
          kind: external
          description: The CICS (Customer Information Control System) Transaction Server Problem Determination agent can take queries about CICS error codes and provide answers using documentation and live system information.
          route_name: ${CICS_PD_AGENT_ROUTE_NAME}
          route_path: /v1/problem_determination/
          namespace: ${CICS_PD_AGENT_NAMESPACE}
          auth_type: API_KEY
          auth_value_key: ${CICS_PD_AGENT_AUTH_TOKEN}
        - name: CICS_Transaction_Server_Tool_Calling_Agent_for_Z_ext
          kind: external
          description: The CICS (Customer Information Control System) Transaction Server Tool Calling agent can take queries about CICS resources and fetch data when the resource type and identifier or name are provided.
          route_name: ${CICS_TC_AGENT_ROUTE_NAME}
          route_path: /v1/cics_tool_calling/
          namespace: ${CICS_TC_AGENT_NAMESPACE}
          auth_type: API_KEY
          auth_value_key: ${CICS_TC_AGENT_AUTH_TOKEN}
        - name: CICS_Transaction_Server_Followup_Agent_for_Z_ext
          kind: external
          description: The CICS (Customer Information Control System) Transaction Server Followup agent can answer followup questions related to responses from other agents. This agent excels at answering followup questions.
          route_name: ${CICS_FOLLOWUP_AGENT_ROUTE_NAME}
          route_path: /v1/followup/
          namespace: ${CICS_FOLLOWUP_AGENT_NAMESPACE}
          auth_type: API_KEY
          auth_value_key: ${CICS_FOLLOWUP_AGENT_AUTH_TOKEN}
