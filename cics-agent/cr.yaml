apiVersion: wxa4z.watsonx.ibm.com/v1alpha1
kind: AgentService
metadata:
  name: cics-agent
  namespace: ""
  labels:
    wxa4z.watsonx.ibm.com/managed-by: agent-operator

spec:
  releaseName: cics-agent
  tenantId: ""
  namespace: "" 
  wxa4z-core-services-namespace: wxa4z-zad # namespace in which the opensearch-client, authorization etc are deployed

  agentDetails:
    - agentName: cics-agent
      agentId: wxa4z:cics-agent:agent
      displayName: IBM CICS Transaction Server agents for Z
      description: The CICS (Customer Information Control System) Transaction Server agent can take queries about CICS concepts, such as topologies and also provide problem determination assistance for transaction error codes.
      bootstrapConfig:
        name: "cics-agent-bootstrap-config"
        fileName: cics_agent_bootstrap_config.yaml

  chart:
    repository: oci://icr.io/wxa4z-dev-container-registry # (oci://icr.io/wxa4z-dev-container-registry)
    name: cics-agent # (upgrade-agent)
    version: 1.3.0
    # pullSecrets: # if not mentioned in CR, by default will search in the secret - pull-secret
    #   - name: pull-secret # the name of the secret containing the credentials for the image repo of the agent so that the tar.gz can be pulled

  values:
    replicaCount: 1

    global:
      secrets:
        name: wxa4z-watsonx-credentials # this should be provided in the CR so that the global variables can be referenced

    secrets:
      name: wxa4z-cics-agent-secrets # upgrade-agent-secrets (this secret is about each agent)

    env: # below are samples of configurable environment variables
      WATSONX_MODEL_ID: "meta-llama/llama-3-3-70b-instruct"
      MODEL_RUNTIME: "openai_protocol"
      
      # Tool Calling Agent Configuration
      toolCalling:
        MCP_SERVER_URL: ""  # REQUIRED: MCP Server URL endpoint
        APPLID: ""  # REQUIRED: VTAM Generic APPLID for target CICS system
      
      # Followup Agent Configuration
      followup:
        WRAPPER_URL: ""  # REQUIRED: Z RAG wrapper URL
        WRAPPER_USERNAME: ""  # REQUIRED: Z RAG username
        WRAPPER_PASSWORD: ""  # REQUIRED: Z RAG password
        INGESTION_URL: ""  # REQUIRED: Data ingestion endpoint URL
        INGESTION_PASSWORD: ""  # REQUIRED: Ingestion service password

    # Certificate configurations for self-signed certificates
    certificates:
      # Topology Agent Certificate
      topologyCertSecret:
        name: cics-topology-cert-secret
        enabled: false  # Set to true if using self-signed certificates
        # certificate: |
        #   -----BEGIN CERTIFICATE-----
        #   <BASE64_ENCODED_CERTIFICATE>
        #   -----END CERTIFICATE-----
      
      # Problem Determination Agent Certificate
      pdCertSecret:
        name: cics-pd-cert-secret
        enabled: false  # Set to true if using self-signed certificates
        # certificate: |
        #   -----BEGIN CERTIFICATE-----
        #   <BASE64_ENCODED_CERTIFICATE>
        #   -----END CERTIFICATE-----
      
      # Tool Calling Agent Certificate
      tcCertSecret:
        name: cics-tc-cert-secret
        enabled: false  # Set to true if using self-signed certificates
        # certificate: |
        #   -----BEGIN CERTIFICATE-----
        #   <BASE64_ENCODED_CERTIFICATE>
        #   -----END CERTIFICATE-----
      
      # Followup Agent Certificate
      followupCertSecret:
        name: cics-followup-cert-secret
        enabled: false  # Set to true if using self-signed certificates
        # certificate: |
        #   -----BEGIN CERTIFICATE-----
        #   <BASE64_ENCODED_CERTIFICATE>
        #   -----END CERTIFICATE-----

    # License acceptance
    acceptLicense: false  # REQUIRED: Set to true to accept IBM Terms - https://www.ibm.com/support/customer/csol/terms/?id=L-SSLZ-QYC4LH

---
# Secret Template for CICS Topology Agent
apiVersion: v1
kind: Secret
metadata:
  name: cics-topology-agent-secrets
  namespace: ""  # REQUIRED: Must match the agent namespace
type: Opaque
data:
  # All values must be base64-encoded
  
  # Watsonx Configuration (REQUIRED)
  WATSONX_API_KEY: ""  # REQUIRED: Your watsonx API key
  WATSONX_PROJECT_URL: ""  # REQUIRED: Your watsonx URL
  WATSONX_PROJECT_ID: ""  # REQUIRED: Identifier for your watsonx Project ID
  
  # Z RAG Configuration (REQUIRED)
  WRAPPER_USERNAME: ""  # REQUIRED: Username for Z RAG instance
  WRAPPER_PASSWORD: ""  # REQUIRED: Password for Z RAG instance
  WRAPPER_URL: ""  # REQUIRED: URL for Z RAG instance
  
  # Ingestion Configuration (REQUIRED)
  INGESTION_URL: ""  # REQUIRED: Endpoint URL for data ingestion
  INGESTION_PASSWORD: ""  # REQUIRED: Password for ingestion service
  
  # Agent Registration (REQUIRED)
  AGENT_ID: ""  # REQUIRED: Unique identifier for the Agent instance
  AGENT_SECRET: ""  # REQUIRED: Secret key for agent authentication

---
