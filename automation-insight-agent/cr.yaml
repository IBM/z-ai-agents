apiVersion: wxa4z.watsonx.ibm.com/v1alpha1
kind: AgentService
metadata:
  name: automation-insights-agent
  namespace: ""
  labels:
    wxa4z.watsonx.ibm.com/managed-by: agent-operator
spec:
  releaseName: automation-insights-agent
  namespace: ""
  tenantId: ""
  wxa4z-core-services-namespace: wxa4z-zad
  agentDetails:
      - agentName: automation-insights-agent
        agentId: wxa4z:automation-agent-z:agent
        description: 'This is for automation-insights services'
        bootstrapConfig:
          name: "automation-insights-agent-bootstrap-config"
          fileName: "automation_insight_agent_bootstrap_config.yaml"  
  chart:
    repository: oci://icr.io/wxa4z-dev-container-registry
    name: automation-insights-agent
    version: "1.2.1"
    #pullSecrets:
     # - name: pull-secret

  values:
    replicaCount: 1
    global:
        secrets:
            name: wxa4z-watsonx-credentials
    secrets:
      name: wxa4z-automation-insights-agent-secrets
    env:
      WATSONX_MODEL_ID: "openai/gpt-oss-120b"
      MODEL_RUNTIME: "openai_protocol"
      
